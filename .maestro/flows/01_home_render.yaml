# Smoke: boot straight into the Home tab and verify the Ruby/Opal backed
# timeline rendered correctly.
#
# Regression coverage:
#   - Root component mounts (app-root)
#   - Ruby render pipeline is alive (engine-banner with Opal info)
#   - Top tabs render and default to "おすすめ"
#   - At least one seed post is in the FlatList (post-p1)
appId: host.exp.Exponent
name: "01 Home render"
tags: [smoke, home]
---
# Reset JS state (SQLite file survives the relaunch)
- stopApp
- openLink: "exp://127.0.0.1:8081"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 20000
- assertVisible:
    id: "app-root"
- assertVisible:
    id: "home-screen"
- assertVisible:
    id: "top-bar"
- assertVisible: "おすすめ"
- assertVisible: "フォロー中"
- assertVisible:
    id: "engine-banner"
- assertVisible: "Engine: Opal (opal)"
# post-p1 is a seed post — SQLite user posts may appear above it if
# earlier flows ran, so scroll until it's on screen.
- scrollUntilVisible:
    element:
      id: "post-p1"
    direction: DOWN
    timeout: 8000
- takeScreenshot:
    path: "home_initial"
